name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -r requirements.txt
      - name: Test
        run: pytest -q
      - name: Evaluation
        run: python scripts/run_eval.py
      - name: Docker build
        run: docker build -t hep-assist-fieldkit-pro .
